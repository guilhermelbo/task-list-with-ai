spring.application.name=api

# CORS — sobrescreva em produção via variável de ambiente CORS_ALLOWED_ORIGINS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Paginação
spring.data.web.pageable.max-page-size=100

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# AI Provider: openrouter | ollama | disabled
ai.provider=openrouter

# OpenRouter (OpenAI-compatible)
ai.openrouter.base-url=https://openrouter.ai/api/v1
ai.openrouter.model-name=mistralai/mistral-nemo
ai.openrouter.api-key=${OPENROUTER_API_KEY}
ai.openrouter.temperature=0.3
ai.openrouter.max-tokens=2048

# Ollama (local)
ai.ollama.base-url=http://localhost:11434
ai.ollama.model-name=llama3.1:8b
ai.ollama.temperature=0.3
ai.ollama.max-tokens=2048

# Chat memory
ai.assistant.memory.max-messages=20
